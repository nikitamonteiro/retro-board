<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retrospective Board</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f5f7;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.column {
  background: white;
  border-radius: 10px;
  padding: 12px;
  min-height: 600px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.column-header {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: #fff8b3;
  padding: 12px;
  border-radius: 8px;
  word-wrap: break-word;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.vote-section {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.vote-btn {
  border: none;
  background: #2563eb;
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.vote-btn:hover {
  background: #1d4ed8;
}

.add-card {
  margin-top: 12px;
}

textarea {
  width: 100%;
  resize: none;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.add-btn {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #16a34a;
  color: white;
  cursor: pointer;
}

.add-btn:hover {
  background: #15803d;
}
</style>

<!-- ✅ Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>Sprint Retrospective</h1>
<div class="board" id="board"></div>

<!-- ✅ MAIN SCRIPT -->
<script>
// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDBA-w2PwOEyXBhbhbaJC2VXzB9cMylNio",
  authDomain: "retro-board-d3ebd.firebaseapp.com",
  projectId: "retro-board-d3ebd",
  storageBucket: "retro-board-d3ebd.firebasestorage.app",
  messagingSenderId: "363857485574",
  appId: "1:363857485574:web:932fd611c4e2123b210887",
  measurementId: "G-F0T6FTM4HX"
};

// ✅ Init Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ Columns
const columns = [
  "What Went Well?",
  "What didn't go so well?",
  "What have I learnt?",
  "What still puzzles me?"
];

const board = document.getElementById("board");

// ✅ Create UI
columns.forEach((title, index) => {
  const column = document.createElement("div");
  column.className = "column";

  column.innerHTML = `
    <div class="column-header">${title}</div>
    <div class="cards" id="cards-${index}"></div>
    <div class="add-card">
      <textarea id="input-${index}" rows="3" placeholder="Add your point..."></textarea>
      <button class="add-btn" onclick="addCard(${index})">Add Point</button>
    </div>
  `;

  board.appendChild(column);
});

// ✅ ADD CARD (now saves to Firebase)
function addCard(columnId) {
  const input = document.getElementById(`input-${columnId}`);
  const text = input.value.trim();
  if (!text) return;

  db.collection("cards").add({
    text: text,
    columnId: columnId,
    votes: 0,
    createdAt: new Date()
  });

  input.value = "";
}

// ✅ REAL-TIME LISTENER (THIS FIXES YOUR MAIN ISSUE)
db.collection("cards")
  .orderBy("createdAt")
  .onSnapshot(snapshot => {

    // Clear existing UI
    document.querySelectorAll(".cards").forEach(el => el.innerHTML = "");

    snapshot.forEach(doc => {
      const data = doc.data();

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div>${data.text}</div>
        <div class="vote-section">
          <span>${data.votes} votes</span>
          <button class="vote-btn" onclick="vote('${doc.id}', ${data.votes})">
            👍 Vote
          </button>
        </div>
      `;

      document
        .getElementById(`cards-${data.columnId}`)
        .appendChild(card);
    });
});

// ✅ VOTE FUNCTION (shared across users)
function vote(id, currentVotes) {
  db.collection("cards").doc(id).update({
    votes: currentVotes + 1
  });
}
</script>

</body>
</html>
``
