<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retrospective Board</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f5f7;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.column {
  background: white;
  border-radius: 10px;
  padding: 12px;
  min-height: 600px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.column-header {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ddd;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: #fff8b3;
  padding: 12px;
  border-radius: 8px;
  position: relative;
  word-wrap: break-word;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.vote-section {
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.vote-btn {
  border: none;
  background: #2563eb;
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.vote-btn:hover {
  background: #1d4ed8;
}

.add-card {
  margin-top: 12px;
}

textarea {
  width: 100%;
  resize: none;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.add-btn {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #16a34a;
  color: white;
  cursor: pointer;
}

.add-btn:hover {
  background: #15803d;
}

@media (max-width: 1000px) {
  .board {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .board {
    grid-template-columns: 1fr;
  }
}
</style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

</head>

<body>

<h1>Sprint Retrospective</h1>

<div class="board" id="board"></div>

<script>
const columns = [
  "What Went Well?",
  "What didn't go so well?",
  "What have I learnt?",
  "What still puzzles me?"
];

const board = document.getElementById("board");

columns.forEach((title, index) => {
  const column = document.createElement("div");
  column.className = "column";

  column.innerHTML = `
    <div class="column-header">${title}</div>

    <div class="cards" id="cards-${index}"></div>

    <div class="add-card">
      <textarea id="input-${index}" rows="3"
        placeholder="Add your point..."></textarea>
      <button class="add-btn" onclick="addCard(${index})">
        Add Point
      </button>
    </div>
  `;

  board.appendChild(column);
});

function addCard(columnId) {
  const input = document.getElementById(`input-${columnId}`);
  const text = input.value.trim();

  if (!text) return;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div>${text}</div>
    <div class="vote-section">
      <span class="vote-count">0 votes</span>
      <button class="vote-btn">👍 Vote</button>
    </div>
  `;

  const voteBtn = card.querySelector(".vote-btn");
  const voteCount = card.querySelector(".vote-count");

  let votes = 0;

  voteBtn.addEventListener("click", () => {
    votes++;
    voteCount.textContent =
      votes === 1 ? "1 vote" : `${votes} votes`;
  });

  document
    .getElementById(`cards-${columnId}`)
    .appendChild(card);

  input.value = "";
}
</script>

</body>
</html>
